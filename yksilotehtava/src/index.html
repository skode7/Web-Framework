<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Restaurant</title>
    <link rel="stylesheet" href="style.css" />
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <header class="headerbar">
      <h1>Restaurant</h1>
      <nav class="navbar">
        <a class="bar" href="#home">Home</a>
        <a class="bar" href="#find-nearest">Find nearest</a>
        <a class="bar" href="#restaurants">Restaurants</a>
        <a class="bar" href="#login">Login</a>
      </nav>
    </header>
    <main>
      <section class="home-section" id="home">
        <div class="hero-content">
          <h2>Nälkä? Me toimitamme.</h2>
          <a href="#restaurants" class="cta-button">Selaa ravintoloita</a>
        </div>
      </section>

      <section class="find-nearest-section" id="find-nearest">
        <div id="map"></div>
        <p>Map here</p>
      </section>

      <section class="restaurants-section" id="restaurants">
        <dialog class="restaurant-dialog"></dialog>
        <div class="restaurant-section-menu"></div>
        <div class="restaurant-grid"></div>
      </section>

      <section class="login-section" id="login">
        <div class="login-card">
          <h2>Kirjaudu sisään</h2>
          <form id="login-form">
            <div class="input-group">
              <label for="username">Käyttäjätunnus</label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Syötä tunnus"
              />
            </div>

            <div class="input-group">
              <label for="password">Salasana</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Syötä salasana"
              />
            </div>

            <button type="submit" id="loginButton">Kirjaudu</button>

            <p class="form-footer">
              Eikö tunnusta? <a href="#">Rekisteröidy</a>
            </p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
