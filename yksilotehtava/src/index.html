<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Campus Restaurants</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
    />
    <script type="module" src="main.js"></script>
  </head>
  <body>
    <header class="headerbar">
      <h1>Lounas.io</h1>
      <nav class="navbar">
        <a class="bar" href="#home">Etusivu</a>
        <a class="bar" href="#find-nearest">Etsi lähin</a>
        <a class="bar" href="#restaurants">Ravintolat</a>
        <a class="bar" href="#login">Kirjaudu</a>
      </nav>
    </header>
    <main>
      <section class="home-section active" id="home">
        <div class="hero-container">
          <div class="hero-card">
            <h1>Campus Eats</h1>
            <p class="subtitle">
              Suomen opiskelijaravintolat kätesi ulottuvilla.
            </p>

            <div class="hero-features">
              <div class="feature">
                <span>📍</span>
                <p>Lähimmät</p>
              </div>
              <div class="feature">
                <span>🍽️</span>
                <p>Menut</p>
              </div>
              <div class="feature">
                <span>❤️</span>
                <p>Suosikit</p>
              </div>
            </div>

            <a href="#restaurants" class="cta-button" id="start-browsing"
              >Selaa ravintoloita</a
            >
          </div>
        </div>
      </section>

      <section class="find-nearest-section" id="find-nearest">
        <div class="map-controls">
          <button id="show-nearest-btn" class="cta-button">
            Näytä lähimmät ravintolat
          </button>
        </div>
        <div id="map"></div>
      </section>

      <section class="restaurants-section" id="restaurants">
        <dialog class="restaurant-dialog"></dialog>
        <div class="restaurant-section-menu"></div>
        <div class="restaurant-grid"></div>
      </section>

      <section class="login-section" id="login">
        <div class="login-card">
          <h2>Kirjaudu sisään</h2>
          <form id="login-form">
            <div class="input-group">
              <label for="username">Käyttäjätunnus</label>
              <input
                type="text"
                id="username"
                name="username"
                placeholder="Syötä tunnus"
              />
            </div>

            <div class="input-group">
              <label for="password">Salasana</label>
              <input
                type="password"
                id="password"
                name="password"
                placeholder="Syötä salasana"
              />
            </div>

            <button type="submit" id="loginButton">Kirjaudu</button>

            <p class="form-footer">
              Eikö tunnusta? <a href="#">Rekisteröidy</a>
            </p>
          </form>
        </div>
      </section>
    </main>
  </body>
</html>
